// ── PDF.js helper ──
async function extractPDF(file){
  if(!window.pdfjsLib) throw new Error("PDF.js belum siap, coba lagi.");
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({data:buf}).promise;
  const maxP = Math.min(pdf.numPages, 35);
  let txt = "";
  for(let i=1;i<=maxP;i++){
    const pg = await pdf.getPage(i);
    const ct = await pg.getTextContent();
    txt += `\n[Hal ${i}]\n` + ct.items.map(x=>x.str).join(" ");
  }
  return {text:txt.trim(), totalPages:pdf.numPages, extractedPages:maxP};
}

// ── EXPORT EXCEL ──────────────────────────────────────────────────
function exportExcel(allReviews){
  const rows = [];
  const WEIGHTS = {q1:0.15,q2:0.20,q3:0.20,q4:0.20,q5:0.15,q6:0.10};
  const LABELS  = {q1:"Latar Belakang",q2:"Segmen Pasar",q3:"Inovasi",q4:"Pemasaran",q5:"SDM",q6:"RAB"};

  allReviews.forEach(({proposal,reviewer,slot,scores,notes,done,ts})=>{
    if(!done) return;
    const total = Object.entries(WEIGHTS).reduce((s,[k,w])=>s+(scores[k]||0)*w,0);
    const rek = total>=75?"Lolos":total>=55?"Revisi Mayor":"Tidak Direkomendasikan";
    const row = {
      "No": proposal.no,
      "Judul": proposal.judul,
      "Ketua": proposal.ketua,
      "NIM": proposal.nim,
      "Prodi": proposal.prodi,
      "Fakultas": proposal.fakultas,
      "Reviewer": reviewer,
      "Slot": slot===1?"Reviewer 1":"Reviewer 2",
      "Latar Belakang (15%)": scores.q1||0,
      "Segmen Pasar (20%)": scores.q2||0,
      "Inovasi (20%)": scores.q3||0,
      "Pemasaran (20%)": scores.q4||0,
      "SDM (15%)": scores.q5||0,
      "RAB (10%)": scores.q6||0,
      "Total Skor": Math.round(total*10)/10,
      "Rekomendasi": rek,
      "Komentar": notes?.komentar||"",
      "Saran": notes?.saran||"",
      "Waktu Penilaian": ts||""
    };
    rows.push(row);
  });

  if(rows.length===0){alert("Belum ada penilaian yang selesai untuk diekspor.");return;}

  const ws = XLSX.utils.json_to_sheet(rows);
  // Column widths
  ws["!cols"] = [
    {wch:5},{wch:50},{wch:25},{wch:15},{wch:30},{wch:10},
    {wch:35},{wch:12},{wch:18},{wch:18},{wch:14},{wch:16},
    {wch:12},{wch:10},{wch:12},{wch:18},{wch:40},{wch:40},{wch:20}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Rekap Penilaian P2MW");

  // Sheet 2: Rekap per proposal (rata-rata 2 reviewer)
  const byProposal = {};
  rows.forEach(r=>{
    const k = r["No"];
    if(!byProposal[k]) byProposal[k]={...r,count:0,totalSum:0,scores:[]};
    byProposal[k].count++;
    byProposal[k].totalSum+=r["Total Skor"];
    byProposal[k].scores.push(r["Total Skor"]);
  });
  const rows2 = Object.values(byProposal).map(p=>({
    "No": p["No"],
    "Judul": p["Judul"],
    "Ketua": p["Ketua"],
    "Fakultas": p["Fakultas"],
    "Jumlah Reviewer Selesai": p.count,
    "Rata-rata Skor": p.count>0?Math.round(p.totalSum/p.count*10)/10:0,
    "Rekomendasi Akhir": (()=>{const avg=p.totalSum/p.count;return avg>=75?"Lolos":avg>=55?"Revisi Mayor":"Tidak Direkomendasikan";})()
  })).sort((a,b)=>b["Rata-rata Skor"]-a["Rata-rata Skor"]);
  const ws2 = XLSX.utils.json_to_sheet(rows2);
  ws2["!cols"]=[{wch:5},{wch:50},{wch:25},{wch:10},{wch:22},{wch:15},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws2, "Rekap per Proposal");

  XLSX.writeFile(wb, `Rekap_P2MW_UNNES_2026_${new Date().toLocaleDateString('id-ID').replace(/\//g,'-')}.xlsx`);
}

function ReviewScreen({proposal, reviewer, slot, onBack, onDone}){
  const [adminChecks,setAdminChecks]=useState({});
  const [scores,setScores]=useState({});
  const [komentar,setKomentar]=useState("");
  const [saran,setSaran]=useState("");
  const [openGuide,setOpenGuide]=useState(null);

  // AI state
  const [pdfText,setPdfText]=useState("");
  const [fileInfo,setFileInfo]=useState(null);
  const [isDrag,setIsDrag]=useState(false);
  const [isExtracting,setIsExtracting]=useState(false);
  const [pdfError,setPdfError]=useState("");
  const [isAnalyzing,setIsAnalyzing]=useState(false);
  const [aiResult,setAiResult]=useState(null);
  const [aiError,setAiError]=useState("");
  const [aiApplied,setAiApplied]=useState(false);
  const [debugInfo,setDebugInfo]=useState("");
  const [showAI,setShowAI]=useState(true);
  const [showPDF,setShowPDF]=useState(false);
  const pdfFileRef=useRef(null);
  const fileRef=useRef();

  const scored = RUBRIK.filter(r=>scores[r.id]!==undefined).length;
  const allScored = scored===RUBRIK.length;
  const adminOk = SYARAT_ADMIN.every(s=>adminChecks[s.id]);
  const total = RUBRIK.reduce((a,r)=>scores[r.id]!==undefined?a+(scores[r.id]/100)*r.bobot:a,0);
  const today = new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});
  const apiReady = ZAI_API_KEY !== "GANTI_DENGAN_API_KEY_ANDA";

  const getRec=s=>{
    if(!allScored)return null;
    if(s>=75)return{label:"REKOMENDASIKAN LOLOS",bg:"bg-emerald-600",ring:"ring-emerald-400",icon:"✓"};
    if(s>=55)return{label:"REVISI MAYOR DIPERLUKAN",bg:"bg-amber-500",ring:"ring-amber-400",icon:"⚠"};
    return{label:"TIDAK DIREKOMENDASIKAN",bg:"bg-rose-600",ring:"ring-rose-400",icon:"✗"};
  };
  const rec=getRec(total);

  // PDF processing
  const processFile=async(file)=>{
    if(!file)return;
    if(file.type!=="application/pdf"){setPdfError("Hanya file PDF.");return;}
    if(file.size>20*1024*1024){setPdfError("Maks 20 MB.");return;}
    setPdfError("");setIsExtracting(true);
    setFileInfo({name:file.name,size:(file.size/1024).toFixed(0)});
    pdfFileRef.current = file; // simpan file asli
    try{
      const{text,totalPages,extractedPages}=await extractPDF(file);
      if(!text||text.length<50){setPdfError("PDF tidak bisa dibaca (kemungkinan scan/gambar).");setIsExtracting(false);return;}
      setPdfText(text);
      setFileInfo(f=>({...f,totalPages,extractedPages,chars:text.length}));
    }catch(e){setPdfError("Gagal baca PDF: "+e.message);}
    finally{setIsExtracting(false);}
  };
  
  const openPDF=()=>{
    if(!pdfFileRef.current)return;
    const url=URL.createObjectURL(pdfFileRef.current);
    window.open(url,'_blank');
    // revoke setelah delay
    setTimeout(()=>URL.revokeObjectURL(url),10000);
  };

  // AI Analysis
  const doAnalyze=async()=>{
    if(!pdfText.trim()){setAiError("Upload PDF terlebih dahulu.");return;}
    if(!apiReady){setAiError("API Key belum diisi di file index.html.");return;}
    setIsAnalyzing(true);setAiError("");setAiResult(null);

    const teks = pdfText.substring(0,3000);
    const prompt = `Evaluasi proposal P2MW. Skor 100/75/50/25.
Judul: ${proposal.judul}
Pengusul: ${proposal.ketua} (${proposal.fakultas})
TEKS: ${teks}
Balas HANYA JSON (tanpa markdown):
{"q1":{"skor":75,"alasan":"..."},"q2":{"skor":75,"alasan":"..."},"q3":{"skor":75,"alasan":"..."},"q4":{"skor":50,"alasan":"..."},"q5":{"skor":75,"alasan":"..."},"q6":{"skor":75,"alasan":"..."},"kekuatan":["...","..."],"kelemahan":["...","..."],"ringkasan":"..."}`;

    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>{ctrl.abort();},25000);
      const res=await fetch(ZAI_URL,{
        method:"POST",
        signal:ctrl.signal,
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${ZAI_API_KEY}`},
        body:JSON.stringify({
          model:ZAI_MODEL,
          messages:[
            {role:"system",content:"Kamu adalah evaluator proposal. Jawab HANYA dengan JSON valid sesuai format, tanpa kalimat pembuka atau penutup."},
            {role:"user",content:prompt}
          ],
          temperature:0.3,
          max_tokens:800,
          stream:false
        })
      });
      clearTimeout(timer);

      if(!res.ok){
        let errMsg=`HTTP Error ${res.status}`;
        try{const e=await res.json();errMsg=e?.error?.message||errMsg;}catch{}
        if(res.status===401||res.status===403)errMsg="API Key tidak valid atau kedaluwarsa.";
        if(res.status===429)errMsg="Terlalu banyak permintaan. Tunggu sebentar lalu coba lagi.";
        throw new Error(errMsg);
      }

      const data=await res.json();
      console.log("RAW API response:", JSON.stringify(data).substring(0,500));

      // Cek semua kemungkinan lokasi content
      let raw="";
      const ch = data?.choices?.[0];
      if(ch){
        // Coba semua field yang mungkin
        raw = ch?.message?.content
           || ch?.message?.reasoning_content
           || ch?.text
           || ch?.delta?.content
           || "";
        // Kalau masih kosong, cek apakah ada finish_reason stop
        if(!raw && ch?.finish_reason==="stop"){
          // Coba ambil dari message langsung
          raw = typeof ch?.message === "string" ? ch.message : "";
        }
      }
      // Fallback ke level atas
      if(!raw) raw = data?.content || data?.text || data?.output || "";

      if(!raw||raw.trim()===""){
        const detail = ch ? JSON.stringify(ch).substring(0,300) : JSON.stringify(data).substring(0,300);
        setDebugInfo(detail);
        console.error("Semua field kosong. choices[0]:", detail);
        // Coba extract apapun yang ada
        const allText = JSON.stringify(data);
        const jsonMatch = allText.match(/\{"q1".*?\}/s);
        if(jsonMatch) {
          raw = jsonMatch[0];
        } else {
          throw new Error("Respons AI kosong. choices[0]: " + detail);
        }
      }

      // Bersihkan markdown fences
      let clean=raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();

      // Cari blok JSON
      const j=clean.indexOf("{"),k=clean.lastIndexOf("}");
      if(j<0||k<0){
        console.error("Tidak ada JSON. Raw:",raw);
        throw new Error("AI tidak mengembalikan JSON. Coba lagi.");
      }
      const jsonStr=clean.slice(j,k+1);

      let parsed;
      try{parsed=JSON.parse(jsonStr);}
      catch(pe){
        console.error("JSON parse error:",pe.message,"String:",jsonStr.substring(0,200));
        throw new Error("Format JSON dari AI tidak valid. Coba lagi.");
      }

      // Validasi minimal
      if(!parsed.q1||!parsed.q2){
        throw new Error("Respons AI tidak lengkap. Coba lagi.");
      }

      setAiResult(parsed);
    }catch(e){
      console.error("AI Error:",e);
      if(e.name==="AbortError") setAiError("Timeout: AI tidak merespons dalam 25 detik. Coba lagi.");
      else setAiError(e.message||"Terjadi kesalahan tidak diketahui.");
    }
    finally{setIsAnalyzing(false);}
  };

  const applyAI=()=>{
    if(!aiResult)return;
    const ns={};
    RUBRIK.forEach(r=>{if(aiResult[r.id]?.skor)ns[r.id]=aiResult[r.id].skor;});

        {rec&&<div className={`inline-block mt-3 ${rec.bg} text-white text-sm font-black px-5 py-2 rounded-xl`}>REKOMENDASI: {rec.icon} {rec.label}</div>}
      </div>

      <main className="max-w-3xl mx-auto px-4 py-5 space-y-4">

          </div>
        </div>

        {/* Print-only catatan & TTD */}
        <div className="hidden print:block space-y-5">
          <div className="border border-slate-300 rounded-xl p-4">
            <div className="font-bold text-sm mb-2 border-b pb-1">Komentar & Penilaian Umum:</div>
            <div className="text-sm min-h-20 whitespace-pre-wrap">{komentar||"—"}</div>
          </div>
          <div className="border border-slate-300 rounded-xl p-4">
            <div className="font-bold text-sm mb-2 border-b pb-1">Saran Perbaikan:</div>
            <div className="text-sm min-h-20 whitespace-pre-wrap">{saran||"—"}</div>
          </div>
          <div className="grid grid-cols-2 gap-16 mt-10 text-sm">
            <div>
              <div className="text-slate-400 text-xs mb-16">Tanda tangan Reviewer:</div>
              <div className="border-t-2 border-slate-700 pt-2">
                <div className="font-bold">{reviewer}</div>
                <div className="text-xs text-slate-500">Reviewer {slot}</div>
              </div>
            </div>
            <div>
              <div className="text-slate-400 text-xs mb-16">Tanggal:</div>
              <div className="border-t-2 border-slate-700 pt-2">
                <div className="font-semibold">{today}</div>
                <div className="text-xs text-slate-500">Semarang</div>
              </div>
            </div>
          </div>
        </div>

        {/* Tombol aksi */}
        <div className="no-print pb-20 flex flex-wrap gap-3 items-center">
          <button onClick={onBack}
            className="flex items-center gap-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold px-6 py-3 rounded-xl text-sm shadow transition-all">
            ← Kembali
          </button>
          {allScored?(
            <>
              <button onClick={()=>window.print()}
                className="flex items-center gap-2 bg-blue-700 hover:bg-blue-800 text-white font-bold px-6 py-3 rounded-xl text-sm shadow transition-all">
                🖨️ Cetak / Simpan PDF
              </button>
              <button onClick={()=>{
                onDone(proposal.no,{
                  proposal, reviewer, slot,
                  scores:{...scores},
                  notes:{komentar:notes.komentar||"",saran:notes.saran||""},
                  done:true,
                  ts:new Date().toLocaleString("id-ID")
                });
              }}
                className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-3 rounded-xl text-sm shadow transition-all">
                ✅ Tandai Selesai & Kembali
              </button>
            </>
          ):(
            <div className="bg-amber-50 border border-amber-200 text-amber-800 text-xs font-semibold px-4 py-3 rounded-xl">
              ⚠️ Masih ada {RUBRIK.length-scored} kriteria yang belum dinilai
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

// ══════════════════════════════════════
//  ROOT
// ══════════════════════════════════════
function App(){
  const [screen,setScreen]=useState("login");
  const [reviewer,setReviewer]=useState("");
  const [cur,setCur]=useState(null);
  const [slot,setSlot]=useState(1);
  const [showAdmin,setShowAdmin]=useState(false);
  const [allReviews,setAllReviews]=useState(()=>{
    try{const v=sessionStorage.getItem("p2mw26_reviews");return v?JSON.parse(v):[];}
    catch{return [];}
  });
  const [doneSet,setDoneSet]=useState(()=>{
    try{const v=sessionStorage.getItem("p2mw26_done");return v?new Set(JSON.parse(v)):new Set();}
    catch{return new Set();}
  });

  const markDone=(no, reviewData)=>{
    setDoneSet(prev=>{
      const n=new Set(prev);n.add(no);
      try{sessionStorage.setItem("p2mw26_done",JSON.stringify([...n]));}catch{}
      return n;
    });
    if(reviewData){
      setAllReviews(prev=>{
        const updated=[...prev.filter(r=>!(r.proposal?.no===reviewData.proposal?.no&&r.slot===reviewData.slot)),reviewData];
        try{sessionStorage.setItem("p2mw26_reviews",JSON.stringify(updated));}catch{}
        return updated;
      });
    }
    setScreen("dashboard");window.scrollTo(0,0);
  };

  if(screen==="login") return <LoginScreen onLogin={n=>{setReviewer(n);setScreen("dashboard");}}/>;
  if(screen==="review"&&cur) return <ReviewScreen proposal={cur} reviewer={reviewer} slot={slot}
    onBack={()=>{setScreen("dashboard");window.scrollTo(0,0);}} onDone={markDone}/>;
  return <>
    <DashboardScreen reviewer={reviewer} doneSet={doneSet}
      onSelect={(p,s)=>{setCur(p);setSlot(s);setScreen("review");window.scrollTo(0,0);}}
      onLogout={()=>{setReviewer("");setScreen("login");}}
      onAdmin={()=>setShowAdmin(true)}/>
    {showAdmin&&<AdminDashboard allReviews={allReviews} onClose={()=>setShowAdmin(false)}/>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
