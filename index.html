// ── PDF.js ──
function usePdfJs(){
  const [ready,setReady]=useState(false);
  useEffect(()=>{
    if(window.pdfjsLib){setReady(true);return;}
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=()=>{
      window.pdfjsLib.GlobalWorkerOptions.workerSrc=
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      setReady(true);
    };
    document.head.appendChild(s);
  },[]);
  return ready;
}

async function extractPDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
  const maxP=Math.min(pdf.numPages,40);
  let txt="";
  for(let i=1;i<=maxP;i++){
    const pg=await pdf.getPage(i);
    const ct=await pg.getTextContent();
    txt+=`\n[Hal ${i}]\n`+ct.items.map(x=>x.str).join(" ")+"\n";
  }
  return{text:txt.trim(),totalPages:pdf.numPages,extractedPages:maxP};
}

function DashboardScreen({reviewer, onSelectProposal, onLogout, completedNos}){
  const proposals = PROPOSALS_DATA.filter(p=>p.r1===reviewer||p.r2===reviewer);

  const [search,setSearch]=useState("");

    const s=search.toLowerCase();
    const matchSearch=!s||p.ketua.toLowerCase().includes(s)||p.judul.toLowerCase().includes(s)||String(p.no).includes(s);
    const isDone=completedNos.has(p.no);

  });

              style={{width:`${proposals.length?done/proposals.length*100:0}%`}}/>

                    </div>
                    <div className="font-semibold text-slate-800 text-sm leading-snug truncate">{p.judul}</div>
                    <div className="text-xs text-slate-500 mt-1">{p.ketua} · {p.prodi}</div>
                  </div>
                  <div className="text-slate-300 text-lg shrink-0">›</div>
                </div>
              </div>
            );
          })}
          {filtered.length===0&&(
            <div className="text-center py-12 text-slate-400">
              <div className="text-4xl mb-2">🔍</div>
              <div className="text-sm">Tidak ada proposal ditemukan</div>
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

//  SCREEN 3: FORM PENILAIAN
// ══════════════════════════════════════
function ReviewScreen({proposal, reviewerName, reviewerSlot, onBack, onComplete}){
  const pdfJsReady=usePdfJs();

  // State
  const [adminChecks,setAdminChecks]=useState({});
  const [scores,setScores]=useState({});
  const [komentar,setKomentar]=useState("");
  const [saran,setSaran]=useState("");
  const [inputMode,setInputMode]=useState("upload");
  const [proposalText,setProposalText]=useState("");
  const [fileInfo,setFileInfo]=useState(null);
  const [isDragging,setIsDragging]=useState(false);
  const [isExtracting,setIsExtracting]=useState(false);
  const [uploadError,setUploadError]=useState("");
  const [aiAnalysis,setAiAnalysis]=useState(null);
  const [isAnalyzing,setIsAnalyzing]=useState(false);
  const [aiError,setAiError]=useState("");
  const [aiApplied,setAiApplied]=useState(false);
  const fileRef=useRef();

  const totalScore=RUBRIK.reduce((a,r)=>scores[r.id]!==undefined?a+(scores[r.id]/100)*r.bobot:a,0);
  const scoredCount=RUBRIK.filter(r=>scores[r.id]!==undefined).length;
  const allScored=scoredCount===RUBRIK.length;
  const adminOk=SYARAT_ADMIN.every(s=>adminChecks[s.id]);

  const getRec=s=>{
    if(!allScored)return null;
    if(s>=75)return{label:"REKOMENDASIKAN LOLOS ✓",bg:"bg-emerald-600",txt:"text-emerald-600"};
    if(s>=55)return{label:"PERLU REVISI MAYOR ⚠",bg:"bg-amber-500",txt:"text-amber-600"};
    return{label:"TIDAK DIREKOMENDASIKAN ✗",bg:"bg-rose-600",txt:"text-rose-600"};
  };
  const rec=getRec(totalScore);

  // PDF Upload
  const processFile=useCallback(async(file)=>{
    if(!file)return;
    if(file.type!=="application/pdf"){setUploadError("Hanya file PDF.");return;}
    if(file.size>20*1024*1024){setUploadError("Maks 20 MB.");return;}
    setUploadError("");setIsExtracting(true);
    setFileInfo({name:file.name,size:(file.size/1024).toFixed(0)});
    try{
      const{text,totalPages,extractedPages}=await extractPDF(file);
      if(!text||text.length<50){
        setUploadError("PDF tidak bisa dibaca (kemungkinan scan/gambar). Gunakan tab Tempel Teks.");
        setIsExtracting(false);return;
      }
      setProposalText(text);
      setFileInfo(f=>({...f,totalPages,extractedPages,chars:text.length}));
    }catch(e){setUploadError("Gagal baca PDF: "+e.message);}
    finally{setIsExtracting(false);}
  },[]);

  // AI Analysis
  const analyze=async()=>{
    if(!proposalText.trim()){setAiError("Upload PDF atau tempel teks terlebih dahulu.");return;}
    if(GEMINI_API_KEY==="GANTI_DENGAN_API_KEY_GEMINI_ANDA"){
      setAiError("API Key belum dikonfigurasi. Edit file index.html dan isi GEMINI_API_KEY.");return;
    }
    setIsAnalyzing(true);setAiError("");setAiAnalysis(null);
    const prompt=`Anda adalah evaluator proposal P2MW UNNES 2026 yang berpengalaman dan objektif.

Judul Proposal: "${proposal.judul}"
Pengusul: ${proposal.ketua} (${proposal.prodi}, ${proposal.fakultas})

Teks proposal:
---
${proposalText.substring(0,10000)}
---

Evaluasi 6 kriteria P2MW 2026. Pilih skor: 100, 75, 50, atau 25.
q1 - Latar Belakang & Tujuan Mulia (15%): urgensi masalah, dampak sosial
q2 - Segmen Pelanggan & Potensi Pasar (20%): kejelasan target, validasi, data pasar  
q3 - Inovasi / Keunikan Produk (20%): orisinalitas, keunggulan kompetitif
q4 - Strategi Pemasaran & Distribusi (20%): kelengkapan, distribusi, proyeksi
q5 - SDM / Tim (15%): komposisi, kompetensi, relevansi
q6 - RAB (10%): kewajaran, ketaatan ketentuan

Jika info kurang → skor 50 alasan "informasi tidak cukup."
Jawab HANYA JSON valid tanpa markdown:
{"q1":{"skor":75,"alasan":"2-3 kalimat spesifik."},"q2":{"skor":50,"alasan":"..."},"q3":{"skor":75,"alasan":"..."},"q4":{"skor":50,"alasan":"..."},"q5":{"skor":75,"alasan":"..."},"q6":{"skor":75,"alasan":"..."},"kekuatan":["...","...","..."],"kelemahan":["...","...","..."],"catatan_umum":"2-3 kalimat ringkasan."}`;

    try{
      const res=await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
        {method:"POST",headers:{"Content-Type":"application/json"},
         body:JSON.stringify({contents:[{parts:[{text:prompt}]}],
           generationConfig:{temperature:0.1,maxOutputTokens:1500}})}
      );
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${res.status}`);}
      const data=await res.json();
      const raw=data?.candidates?.[0]?.content?.parts?.[0]?.text||"";
      if(!raw)throw new Error("Respons AI kosong.");
      const clean=raw.replace(/```json|```/g,"").trim();
      const j=clean.indexOf("{"),k=clean.lastIndexOf("}");
      if(j<0||k<0)throw new Error("Format respons tidak valid.");
      setAiAnalysis(JSON.parse(clean.slice(j,k+1)));
      setAiApplied(false);
    }catch(e){
      if(e.message.includes("API_KEY")||e.message.includes("400"))
        setAiError("API Key tidak valid. Periksa GEMINI_API_KEY di file index.html.");
      else setAiError("Analisis gagal: "+e.message);
    }finally{setIsAnalyzing(false);}
  };

  const applyAI=()=>{
    if(!aiAnalysis)return;
    const ns={};
    RUBRIK.forEach(r=>{if(aiAnalysis[r.id]?.skor)ns[r.id]=aiAnalysis[r.id].skor;});
    setScores(p=>({...ns,...p}));
    setAiApplied(true);
  };

  const handleComplete=()=>{
    if(!allScored)return;
    onComplete(proposal.no);
    window.scrollTo(0,0);
  };

  return(
    <div className="min-h-screen bg-slate-100">

        <div className="max-w-4xl mx-auto px-4 py-3 flex items-center gap-3">
          <button onClick={onBack} className="bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-3 py-2 rounded-xl transition-all">
            ← Kembali
          </button>
          <div className="flex-1 min-w-0">
            <div className="text-xs text-blue-200">Proposal #{proposal.no} · Reviewer {reviewerSlot} · {reviewerName}</div>
            <div className="font-bold text-sm truncate">{proposal.judul}</div>
          </div>
          <div className="text-right shrink-0">
            {rec?(
              <div className={`${rec.bg} text-white text-xs font-bold px-3 py-1 rounded-lg`}>{totalScore.toFixed(0)}</div>
            ):(
              <div className="text-blue-200 text-xs">{scoredCount}/{RUBRIK.length}</div>
            )}
          </div>
        </div>
        <div className="max-w-4xl mx-auto px-4 pb-2">
          <div className="bg-blue-900 rounded-full h-1.5">
            <div className="bg-blue-300 h-1.5 rounded-full transition-all duration-500"
              style={{width:`${scoredCount/RUBRIK.length*100}%`}}/>
          </div>
        </div>
      </header>

      {/* Print header */}
      <div className="hidden print:block p-6 border-b-2 border-slate-800 mb-4">
        <div className="text-center">
          <div className="font-black text-xl">FORMULIR PENILAIAN PROPOSAL P2MW UNNES 2026</div>
          <div className="text-sm text-slate-500 mt-1">Universitas Negeri Semarang · Program Pemberdayaan Mahasiswa Wirausaha</div>
        </div>
        <div className="mt-4 grid grid-cols-2 gap-2 text-sm">
          <div><b>No. Proposal:</b> #{proposal.no}</div>
          <div><b>Fakultas:</b> {proposal.fakultas}</div>
          <div><b>Ketua Tim:</b> {proposal.ketua}</div>
          <div><b>NIM:</b> {proposal.nim}</div>
          <div className="col-span-2"><b>Judul:</b> {proposal.judul}</div>
          <div><b>Reviewer:</b> {reviewerName}</div>
          <div><b>Posisi:</b> Reviewer {reviewerSlot}</div>
          <div><b>Total Skor:</b> {totalScore.toFixed(2)} / 100</div>
          <div><b>Tanggal:</b> {new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"})}</div>
        </div>
        {rec&&<div className="mt-3 inline-block border-2 border-slate-800 px-4 py-1 font-bold text-sm rounded">
          REKOMENDASI: {rec.label}
        </div>}
      </div>

      <main className="max-w-4xl mx-auto px-4 py-5 space-y-4">

        {/* ── INFO PROPOSAL ── */}
        <div className="bg-blue-700 text-white rounded-2xl p-5 shadow fade-in">
          <div className="flex items-start gap-3">
            <div className="bg-white/20 rounded-xl p-2.5 text-xl shrink-0">📋</div>
            <div className="flex-1 min-w-0">
              <div className="flex gap-2 mb-2 flex-wrap">
                <span className="bg-white/20 text-xs font-bold px-2 py-1 rounded-lg">#{proposal.no}</span>
                <span className="bg-white/20 text-xs font-bold px-2 py-1 rounded-lg">{proposal.fakultas}</span>

                <div>🎓 {proposal.prodi}</div>

                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ── RINGKASAN SKOR ── */}
        {allScored&&rec&&(
          <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 fade-in">
            <div className="flex items-start gap-3 mb-4">
              <span className="text-2xl">🏆</span>
              <h2 className="font-bold text-slate-800 text-sm mt-1">Ringkasan Skor</h2>
            </div>
            <div className="space-y-2 mb-4">
              {RUBRIK.map(r=>{
                const s=scores[r.id];
                const w=s!==undefined?(s/100)*r.bobot:0;
                return(
                  <div key={r.id} className="flex items-center gap-2 text-xs">
                    <span>{r.icon}</span>
                    <span className="flex-1 text-slate-600 truncate">{r.aspek}</span>
                    <span className="text-slate-400">{s}×{r.bobot}%=</span>
                    <span className={`font-bold w-10 text-right
                      ${w>=r.bobot*0.75?"text-emerald-600":w>=r.bobot*0.5?"text-amber-600":"text-rose-600"}`}>
                      {w.toFixed(2)}
                    </span>
                  </div>
                );
              })}
            </div>
            <div className={`${rec.bg} text-white rounded-2xl p-5 text-center`}>
              <div className="text-5xl font-black mb-1">{totalScore.toFixed(2)}</div>
              <div className="text-sm opacity-80 mb-2">dari 100 poin</div>
              <div className="text-base font-bold tracking-wide">{rec.label}</div>
            </div>
          </div>
        )}

        {/* ── CATATAN ── */}
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
          <div className="flex items-start gap-3 mb-4">
            <span className="text-2xl">📝</span>
            <h2 className="font-bold text-slate-800 text-sm mt-1">Catatan & Saran Perbaikan</h2>
          </div>
          <div className="space-y-3">
            <div>
              <label className="text-xs font-semibold text-slate-500 block mb-1">Komentar Reviewer</label>
              <textarea value={komentar} onChange={e=>setKomentar(e.target.value)} rows={3}
                placeholder="Catatan umum, kelebihan, atau hal yang perlu diperhatikan..."
                className="w-full text-sm border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-300 resize-none"/>
            </div>
            <div>
              <label className="text-xs font-semibold text-slate-500 block mb-1">Saran Perbaikan</label>
              <textarea value={saran} onChange={e=>setSaran(e.target.value)} rows={3}
                placeholder="Saran konkret yang harus ditindaklanjuti tim..."
                className="w-full text-sm border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-300 resize-none"/>
            </div>
          </div>
        </div>

        {/* PRINT-ONLY catatan */}
        <div className="hidden print:block mt-4 space-y-4">
          <div><div className="font-bold text-sm border-b pb-1 mb-2">Komentar Reviewer:</div>
            <div className="text-sm min-h-16 whitespace-pre-wrap">{komentar||"—"}</div></div>
          <div><div className="font-bold text-sm border-b pb-1 mb-2">Saran Perbaikan:</div>
            <div className="text-sm min-h-16 whitespace-pre-wrap">{saran||"—"}</div></div>
          <div className="grid grid-cols-2 gap-8 mt-8">
            <div><div className="text-xs text-slate-400 mb-10">Tanda tangan:</div>
              <div className="border-t border-slate-400 pt-1 text-sm font-semibold">{reviewerName}</div></div>
            <div><div className="text-xs text-slate-400 mb-10">Tanggal:</div>
              <div className="border-t border-slate-400 pt-1 text-sm">
                {new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"})}</div></div>
          </div>
        </div>

        {/* ── TOMBOL AKSI ── */}
        <div className="flex flex-wrap gap-3 pb-16 no-print">
          <button onClick={()=>{if(allScored)window.print();}}
            disabled={!allScored||!reviewerName}
            className="flex items-center gap-2 bg-blue-700 hover:bg-blue-800 disabled:opacity-40 text-white text-sm font-bold px-6 py-3 rounded-xl transition-all shadow">
            🖨️ Cetak / Simpan PDF
          </button>
          {allScored&&(
            <button onClick={handleComplete}
              className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold px-6 py-3 rounded-xl transition-all shadow">
              ✅ Tandai Selesai & Kembali
            </button>
          )}
          {!allScored&&(
            <div className="self-center text-xs text-amber-700 bg-amber-50 border border-amber-200 px-3 py-2 rounded-lg">
              ⚠ {RUBRIK.length-scoredCount} kriteria belum dinilai
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

// ══════════════════════════════════════
//  ROOT APP
// ══════════════════════════════════════
function App(){
  const [screen,setScreen]=useState("login");
  const [reviewer,setReviewer]=useState("");
  const [selectedProposal,setSelectedProposal]=useState(null);
  const [reviewerSlot,setReviewerSlot]=useState(1);
  const [completedNos,setCompletedNos]=useState(()=>{
    try{const s=sessionStorage.getItem("p2mw_done");return s?new Set(JSON.parse(s)):new Set();}
    catch{return new Set();}
  });

  const markDone=(no)=>{
    setCompletedNos(prev=>{
      const n=new Set(prev);n.add(no);
      sessionStorage.setItem("p2mw_done",JSON.stringify([...n]));
      return n;
    });
    setScreen("dashboard");
  };

  if(screen==="login")
    return <LoginScreen onLogin={name=>{setReviewer(name);setScreen("dashboard");}}/>;

  if(screen==="review"&&selectedProposal)
    return <ReviewScreen
      proposal={selectedProposal}
      reviewerName={reviewer}
      reviewerSlot={reviewerSlot}
      onBack={()=>setScreen("dashboard")}
      onComplete={markDone}/>;

  return <DashboardScreen
    reviewer={reviewer}
    completedNos={completedNos}
    onSelectProposal={(p,slot)=>{setSelectedProposal(p);setReviewerSlot(slot);setScreen("review");}}
    onLogout={()=>{setReviewer("");setScreen("login");}}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
